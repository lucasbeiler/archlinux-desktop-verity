add_dracutmodules+=" tpm2-tss "
add_dracutmodules+=" squash-erofs "
add_dracutmodules+=" systemd-veritysetup systemd-repart systemd-cryptsetup "
reproducible="yes"
uefi="yes"
early_microcode="yes"
hostonly="no"
hostonly_cmdline="no"
tmpdir="/tmp/"
install_optional_items+=" /usr/local/lib/libhardened_malloc.so /etc/ld.so.preload /etc/modprobe.d/blacklist.conf "
add_drivers+=" i915 "
kernel_cmdline="systemd.verity=1 roothash=__VERITY_HASH__ systemd.verity_root_options=panic-on-corruption rd.emergency=reboot rd.shell=0 apparmor=1 security=apparmor lsm=landlock,lockdown,yama,integrity,apparmor,bpf slab_nomerge init_on_alloc=1 init_on_free=1 page_alloc.shuffle=1 oops=panic intel_iommu=on iommu=force iommu.strict=1 iommu.passthrough=0 vsyscall=none pti=on spectre_v2=on mds=full,nosmt efi=disable_early_pci_dma spec_store_bypass_disable=on tsx=off tsx_async_abort=full,nosmt l1tf=full,force nosmt=force kvm.nx_huge_pages=force randomize_kstack_offset=on debugfs=off ipv6.disable=1 extra_latent_entropy modprobe.blacklist=thunderbolt  lockdown=confidentiality module.sig_enforce=1   i915.modeset=1 i915.enable_dpcd_backlight=3 i915.enable_guc=3 i915.force_probe=!5694 xe.force_probe=!5694 pcie_aspm.policy=powersupersave acpi.ec_no_wakeup=1 "
